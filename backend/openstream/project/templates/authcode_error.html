<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Error</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, #102040, #0f172a 40%), #0f172a;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      padding: 28px 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -0.02em;
    }
    .lead {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 15px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.01em;
      margin-bottom: 16px;
    }
    details {
      margin-top: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      padding: 12px 14px;
    }
    summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 600;
      outline: none;
    }
    pre {
      margin: 12px 0 0;
      padding: 12px;
      border-radius: 10px;
      background: #0b1224;
      color: #e5e7eb;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status">Status __STATUS_CODE__</div>
    <h1>Du har ikke adgang til OpenStream. TESSST</h1>
    <h3 class="lead">Kontakt system ejeren i din administration for at få adgang.</h3>
    <details>
      <summary>Show technical details</summary>
      <pre>__DETAIL__</pre>
    </details>
  </div>
</body>
</html>
