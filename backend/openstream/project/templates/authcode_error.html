<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <title>Adgang nægtet | OpenStream</title>
  <style>
    :root {
      --bg-color: #0f172a; /* Deep Slate Blue-Black */
      --card-bg: #1e293b;
      --accent-color: #38bdf8;
    }
    body {
      background-color: var(--bg-color);
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .error-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    .tech-details {
      background-color: #020617 !important;
      border: 1px solid #334155;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.85rem;
    }
    summary {
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
    }
    summary:hover {
      color: var(--accent-color);
    }
  </style>
</head>
<body>
    <img src="__FRONTEND_HOST__/openstream_logo_light.svg" alt="OpenStream Logo" class="position-absolute top-0 start-0 m-4" style="height: 40px;">
    

  <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="card error-card shadow-2xl rounded-4 w-100" style="max-width: 550px;">
      <div class="card-body p-5 text-center">
        
        <div class="mb-4">
          <div class="display-1 text-info opacity-50">
            <i class="bi bi-shield-lock"></i>
          </div>
        </div>

        <span class="badge rounded-pill px-3 py-2 mb-3" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-color); border: 1px solid rgba(56, 189, 248, 0.2);">
          Status: __STATUS_CODE__
        </span>

        <h1 class="h3 fw-bold mb-3 text-white">Ingen adgang til OpenStream</h1>
        
        <p class="text-light mb-4">
          Din konto har ikke de nødvendige rettigheder for at tilgå OpenStream. 
          Venligst kontakt din systemadministrator for at anmode om adgang.
        </p>

        <hr class="my-4 opacity-10">

        <details class="text-start">
          <summary class="small fw-medium">Tekniske detaljer</summary>
          <div class="mt-3">
            <pre class="tech-details text-info p-3 rounded-3 m-0"><code>__DETAIL__</code></pre>
          </div>
        </details>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
